 DGREAD - Read event (dgz) file<br>
&nbsp;&nbsp;DG = DGREAD(SES,EXPNO) reads .dgz of EXPNO in the session (SES).<br>
&nbsp;&nbsp;SES: session name<br>
&nbsp;&nbsp;ExpNo: Experiment number<br>
 <br>
&nbsp;&nbsp;NKL, 10.10.02<br>

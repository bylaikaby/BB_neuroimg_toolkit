 CLNLOAD - Reads the Cln structure from the SIGS directory for Ses,ExpNo<br>
&nbsp;&nbsp;Cln = CLNLOAD(SESSION,ExpNo) will use<br>
&nbsp;&nbsp;catfilename(Ses,ExpNo,'Cln') to read the Cln structure from a<br>
&nbsp;&nbsp;matlab file typically in the SIGS directory.<br>
&nbsp;&nbsp;NKL, 10.10.02<br>
 <br>
&nbsp;&nbsp;See also MATSIGLOAD, EXPGETPAR, ASSIGNIN<br>
<br>

 ADXREAD - read an ADX file<br>
 	wv = ADXREAD(Ses,ExpNo,Obsp,Ch,beg,len,VERBOSE), reads an ADX<br>
 	file produced by Yusuke's facilities. The ADX files are an<br>
 	extended version of the ADF files, and contain data with<br>
 	smaller word-size to avoid memory problems.<br>

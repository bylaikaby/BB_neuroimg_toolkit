 SESALL2BLP - Replace all signals (barring Spkt/Sdf) with BLPs<br>
&nbsp;&nbsp;SESALL2BLP (SESSION, EXPS) Replaces all signals with the BLP. The function is meant to<br>
&nbsp;&nbsp;replace the old signals (LfpH, LfpM etc.) with the BLP signals (see siggetblp).<br>
 <br>
&nbsp;&nbsp;See also EXPGETBLP SIGGETBLP<br>
 <br>
&nbsp;&nbsp;NKL 28.07.04<br>

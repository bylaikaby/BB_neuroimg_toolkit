 SIGSELBLP - Select BLPs by examining their correlation to the stimulus<br>
&nbsp;&nbsp;BLPSELBLP (blp) selects the bands whose power best correlates to the stimulus time<br>
&nbsp;&nbsp;course. It's analogous to BPCORANA or MCORANA but with HRF-convolved neural signals.<br>

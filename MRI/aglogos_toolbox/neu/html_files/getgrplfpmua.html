 GETGRPLFPMUA - Extract power signals from the ClnSpc of a group-file<br>
 	powsig = GETGRPLFPMUA(SESSION,GrpName) reads the ClnSpc structure of a<br>
 	group and generate averages in the standard frequency bands we<br>
 	work with.<br>
 	VERSION : 1.00 NKL, 28.04.03<br>
 <br>
 	See also GETLFPMUA SESSIGPOW<br>

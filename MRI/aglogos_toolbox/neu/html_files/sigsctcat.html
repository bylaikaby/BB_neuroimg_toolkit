 SIGSCTCAT - Concatenate structures and some of their fields.<br>
 	oSig = SIGSCTCAT({'pts','nts',2,XcorAct})<br>
 	oSig = XcorAct{1} where the fields pts & nts have been concatinated<br>
 	with those in XcorAct{2:end} along the 2nd dim.<br>
 	NKL, 10.10.02<br>

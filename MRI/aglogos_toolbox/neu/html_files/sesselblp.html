 SESSELBLP - Selects stimulus/mri-correlated frequency bands based on r-value<br>
&nbsp;&nbsp;SESSELBLP (SesName,EXPS,LOG) calls EXPSELBLP and SIGSELBLP to select individual frequency<br>
&nbsp;&nbsp;bands that best modulate together with the stimulus or the fMRI signal.<br>
 <br>
&nbsp;&nbsp;See also EXPSELBLP SIGSELBLP<br>
&nbsp;&nbsp;NKL, 04.08.04<br>

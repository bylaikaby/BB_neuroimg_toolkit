 SIGHILBERT - Compute Hilbert Transform of the Signal<br>
&nbsp;&nbsp;Sig = SIGHIBLERT(Sig) computes the Hilbert transform of the signal. The amplitude of the<br>
&nbsp;&nbsp;results provides the exact envelop of the signal.<br>

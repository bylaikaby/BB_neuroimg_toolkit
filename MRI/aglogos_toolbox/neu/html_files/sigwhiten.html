 SIGWHITEN - Whiten signal (remove stimulus-related modulations)<br>
&nbsp;&nbsp;SIGWHITEN (Sig1dat,Sig2dat) whitens Sig1dat and if Sig2dat exists applies the same filter<br>
&nbsp;&nbsp;to Sig2dat. The process is necessary for computing the IR function between Sig1dat and<br>
&nbsp;&nbsp;Sig2dat.<br>
&nbsp;&nbsp;NKL, 30.01.05<br>
